# Simple Getting Started Example
# ==============================

# Runtime files default to $XDG_STATE_HOME/github-summary
# (or ~/.local/state/github-summary if XDG_STATE_HOME is unset).

[github]
token = "your_github_token_here"

[llm]
api_key = "your_openai_api_key"
model_name = "gpt-4"
audience = "mixed"  # "user", "maintainer", or "mixed"

# Performance settings (optional)
[performance]
max_concurrent_repos = 4  # Concurrent repository processing
max_concurrent_llm = 3    # Concurrent LLM requests

# Basic repository configuration
[[repositories]]
name = "owner/your-repository"
# Optional: override [llm].audience for this repository.
# audience = "maintainer"

# ==============================
# Next Steps
# ==============================
#
# 1. Add scheduling (optional):
#    [schedule]
#    cron = "0 9 * * 1"    # Every Monday at 9 AM
#    timezone = "UTC"
#
# 2. Add filters (optional):
#    [filters.commits]
#    exclude_commit_messages_regex = "^(docs|test|chore):"
#
# 3. Add per-repository schedules:
#    [repositories.schedule]
#    cron = "0 6 * * *"    # Daily at 6 AM
#
# 4. Multiple repositories:
#    [[repositories]]
#    name = "owner/another-repo"
#
# See other example files for advanced configurations.
